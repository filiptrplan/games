<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pan Game</title>
  <meta name="description" content="A pass-the-phone team guessing game.">
  <style>
    :root{--bg:#f6efe3;--ink:#172238;--muted:#6d7480;--card:#fffaf0;--line:#17223822;--blue:#fffaf0;--red:#ff4d3d;--green:#149c6f;--yellow:#ffd24a}
    *{box-sizing:border-box} html{min-height:100%;background:var(--bg)} body{margin:0;min-height:100vh;color:var(--ink);font:16px/1.45 Avenir Next,ui-rounded,"Trebuchet MS",sans-serif;background:radial-gradient(circle at 18% 12%,#fff 0 9%,#0000 10%),radial-gradient(circle at 82% 18%,#ffd24a 0 8%,#0000 9%),linear-gradient(135deg,#f7efe1 0 50%,#ebf0ff 50%)}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,#0000 0 17px,#17223808 18px),repeating-linear-gradient(90deg,#0000 0 17px,#17223806 18px);mix-blend-mode:multiply}main{width:min(560px,calc(100% - 28px));margin:0 auto;padding:30px 0 48px}.card{position:relative;background:var(--card);color:var(--ink);border:2px solid var(--ink);border-radius:28px;padding:22px;box-shadow:8px 8px 0 var(--ink)}.dark{background:var(--card);color:var(--ink);border-color:var(--ink);box-shadow:8px 8px 0 var(--ink)}h1,h2,h3,p{margin-top:0}h1{font-size:52px;line-height:.92;margin-bottom:12px;letter-spacing:-.06em}h2{letter-spacing:-.03em}.kicker{text-transform:uppercase;letter-spacing:.16em;font-weight:900;font-size:12px;color:var(--red)}.dark .kicker{color:var(--red)}.muted{color:var(--muted)}label{font-weight:900}input,textarea{width:100%;border:2px solid var(--ink);border-radius:18px;padding:14px 15px;font:inherit;background:white;color:var(--ink);box-shadow:3px 3px 0 #17223818}input:focus,textarea:focus{outline:3px solid var(--yellow)}textarea{min-height:96px;resize:vertical}.row{display:flex;gap:10px;align-items:stretch}.row>*{flex:1}.list{display:grid;gap:12px}.pill{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:2px solid var(--ink);border-radius:18px;background:white;box-shadow:3px 3px 0 #17223818}.pill .row{gap:3px}.icon-btn{flex:0 0 38px;width:38px;border:0;border-radius:12px;background:#1722380a;color:var(--muted);font:700 18px/1 inherit;cursor:pointer;box-shadow:none}.icon-btn:hover{background:#17223814;color:var(--ink)}.btn{width:100%;border:2px solid var(--ink);border-radius:18px;padding:15px 18px;background:var(--ink);color:white;font-weight:900;font:inherit;cursor:pointer;box-shadow:4px 4px 0 #0002;transition:transform .08s,box-shadow .08s}.btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #0002}.btn.secondary{background:white;color:var(--ink)}.dark .btn.secondary{background:white;color:var(--ink)}.btn.hot{background:var(--red)}.btn.good{background:var(--green)}.btn:disabled{opacity:.45;cursor:not-allowed}.actions{display:grid;gap:10px;margin-top:16px}.word{font-size:54px;line-height:1.02;font-weight:1000;text-align:center;word-break:break-word;margin:36px 0;letter-spacing:-.06em}.timer{font-size:84px;font-weight:1000;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-.06em}.score{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:14px 0}.score div{background:#1722380a;border:2px solid currentColor;border-radius:18px;padding:12px}.card:not(.dark) .score div{background:#1722380a;color:var(--ink)}.small{font-size:13px}@media(max-width:520px){h1{font-size:44px}.row{flex-direction:column}.pill .row{flex-direction:row}.word{font-size:44px}.timer{font-size:68px}.card,.dark{box-shadow:5px 5px 0 var(--ink)}}
  </style>
</head>
<body>
  <main id="app"></main>
  <script src="./pan-game-app.js"></script>
</body>
</html>
