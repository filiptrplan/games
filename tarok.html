<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tarok | Števec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --felt:#12302a; --felt-deep:#0e2520; --surface:#1b3b32; --surface-2:#214a3f;
    --bone:#efe7d6; --bone-dim:#9fae9f; --brass:#c9a85e; --brass-bright:#e7c982;
    --loss:#df8071; --win:#e7c982; --line:rgba(239,231,214,0.10); --line-strong:rgba(239,231,214,0.18);
    --radius:16px; --shadow:0 18px 40px -22px rgba(0,0,0,0.7);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--bone);
    background:radial-gradient(120% 80% at 50% -10%, #1c3e35 0%, var(--felt) 45%, var(--felt-deep) 100%);
    background-attachment:fixed;min-height:100dvh;-webkit-font-smoothing:antialiased;
    padding:max(14px,env(safe-area-inset-top)) 14px max(28px,env(safe-area-inset-bottom));
  }
  .wrap{max-width:760px;margin:0 auto;}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;}
  .brand .eyebrow{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--brass);font-weight:600;margin-bottom:2px;}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:34px;line-height:0.9;margin:0;letter-spacing:0.01em;}
  .brand .sub{font-size:12px;color:var(--bone-dim);margin-top:5px;max-width:230px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .head-tools{display:flex;align-items:center;gap:8px;flex:none;}
  .seg{display:inline-flex;background:rgba(0,0,0,0.22);border:1px solid var(--line);border-radius:999px;padding:3px;}
  .seg button{appearance:none;border:0;background:transparent;color:var(--bone-dim);font:inherit;font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer;transition:background .15s,color .15s;}
  .seg button[aria-pressed="true"]{background:var(--brass);color:#1a130a;}
  .pill{appearance:none;border:1px solid var(--line);background:rgba(0,0,0,0.18);color:var(--bone);font:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:6px;}
  .pill:hover{border-color:var(--brass);}
  .pill .badge{background:var(--brass);color:#1a130a;border-radius:999px;font-size:11px;padding:0 6px;line-height:16px;min-width:16px;text-align:center;}

  .players{display:grid;gap:12px;margin-bottom:16px;}
  .players.n3{grid-template-columns:repeat(3,1fr);}
  .players.n4{grid-template-columns:repeat(2,1fr);}
  @media(min-width:620px){.players.n4{grid-template-columns:repeat(4,1fr);}}
  .pcard{position:relative;background:linear-gradient(165deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--line);border-radius:var(--radius);padding:14px 12px 12px;box-shadow:var(--shadow);overflow:hidden;}
  .pcard.leader{border-color:var(--brass);box-shadow:var(--shadow),0 0 0 1px var(--brass) inset,0 0 26px -10px var(--brass);}
  .pcard .suit{position:absolute;top:10px;left:11px;font-size:15px;line-height:1;opacity:.85;}
  .pcard .suit.red{color:#d98a7e;}
  .pcard .crown{position:absolute;top:9px;right:11px;font-size:13px;color:var(--brass-bright);}
  .pname{width:100%;margin-top:14px;background:transparent;border:0;color:var(--bone);font-family:'Inter';font-size:13px;font-weight:600;letter-spacing:.02em;text-align:center;padding:2px 0;border-radius:6px;}
  .pname:focus{outline:none;background:rgba(0,0,0,0.18);}
  .pscore{font-family:'Fraunces',serif;font-weight:600;font-size:40px;line-height:1;text-align:center;margin:4px 0 10px;font-variant-numeric:oldstyle-nums;letter-spacing:-0.01em;}
  .pscore.neg{color:var(--loss);} .pscore.pos{color:var(--win);}
  .radlc{display:flex;flex-direction:column;align-items:center;gap:6px;border-top:1px solid var(--line);padding-top:9px;}
  .radlc .lbl{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--bone-dim);}
  .radlc-row{display:flex;align-items:center;gap:7px;}
  .pips{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:90px;min-height:13px;align-items:center;}
  .pip{width:11px;height:11px;border:1.5px solid var(--brass);border-radius:2px;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(201,168,94,.5) 2px,rgba(201,168,94,.5) 3px);}
  .more{font-size:11px;color:var(--brass);font-weight:600;}
  .rbtn{appearance:none;border:1px solid var(--line);background:rgba(0,0,0,0.2);color:var(--bone-dim);width:24px;height:24px;border-radius:7px;font-size:15px;line-height:1;cursor:pointer;display:grid;place-items:center;}
  .rbtn:hover{color:var(--bone);border-color:var(--brass);} .rbtn:active{transform:scale(.94);}

  .panel{background:rgba(0,0,0,0.16);border:1px solid var(--line);border-radius:var(--radius);padding:16px 15px;margin-bottom:14px;}
  .panel h2{font-family:'Inter';font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass);font-weight:600;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;}
  .panel h2 .sum{color:var(--bone-dim);letter-spacing:.04em;text-transform:none;font-size:12px;font-weight:500;}
  .panel h2 .sum b{color:var(--bone);font-weight:600;}
  .entry-grid{display:grid;gap:10px;}
  .entry-grid.n3{grid-template-columns:repeat(3,1fr);}
  .entry-grid.n4{grid-template-columns:repeat(2,1fr);}
  @media(min-width:620px){.entry-grid.n4{grid-template-columns:repeat(4,1fr);}}
  .field{display:flex;flex-direction:column;gap:6px;position:relative;}
  .linkbtn{position:absolute;top:-7px;right:-3px;width:23px;height:23px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);color:var(--bone-dim);font-size:12px;line-height:1;cursor:pointer;display:grid;place-items:center;z-index:3;transition:color .12s,border-color .12s,background .12s;}
  .linkbtn:hover{color:var(--bone);border-color:var(--brass);}
  .linkbtn.armed{color:var(--brass-bright);border-color:var(--brass);background:rgba(201,168,94,0.18);animation:pulse 1s ease-in-out infinite;}
  .linkbtn.linked{color:var(--pc);border-color:var(--pc);background:rgba(0,0,0,0.25);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  .dblbtn{position:absolute;top:-7px;left:-3px;width:23px;height:23px;padding:0;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);color:var(--bone-dim);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:color .12s,border-color .12s,background .12s;}
  .dblbtn:hover{color:var(--bone);border-color:var(--brass);}
  .dblbtn.on{color:#1a130a;background:var(--brass);border-color:var(--brass);}
  .dblhint{font-size:10px;letter-spacing:.04em;color:var(--brass);text-align:center;min-height:13px;line-height:13px;}
  .dblhint b{font-variant-numeric:oldstyle-nums;}
  .rmark{font-size:8px;color:var(--brass);margin-left:2px;vertical-align:super;font-weight:600;}
  .field .fname{font-size:12px;font-weight:600;color:var(--bone-dim);text-align:center;display:flex;gap:5px;justify-content:center;align-items:center;}
  .field .fname .s.red{color:#d98a7e;}
  .stepper{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:rgba(0,0,0,0.2);}
  .stepper button{appearance:none;border:0;background:transparent;color:var(--bone-dim);font:inherit;font-size:17px;font-weight:600;width:34px;cursor:pointer;transition:color .12s,background .12s;flex:none;}
  .stepper button:hover{color:var(--bone);background:rgba(255,255,255,0.04);} .stepper button:active{background:rgba(255,255,255,0.08);}
  .stepper input{flex:1;min-width:0;width:100%;background:transparent;border:0;color:var(--bone);text-align:center;font-family:'Fraunces',serif;font-weight:600;font-size:22px;padding:9px 0;font-variant-numeric:oldstyle-nums;-moz-appearance:textfield;}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .stepper input:focus{outline:none;}
  .stepper.pos input{color:var(--win);} .stepper.neg input{color:var(--loss);}
  .actions{display:flex;gap:10px;margin-top:16px;}
  .btn{appearance:none;border:0;font:inherit;font-weight:600;font-size:14px;border-radius:12px;padding:13px 16px;cursor:pointer;transition:transform .08s,filter .15s,background .15s,color .15s,border-color .15s;letter-spacing:.01em;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{flex:1;background:var(--brass);color:#1a130a;} .btn-primary:hover{filter:brightness(1.06);}
  .btn-ghost{background:rgba(0,0,0,0.2);border:1px solid var(--line);color:var(--bone-dim);}
  .btn-ghost:hover{color:var(--bone);border-color:var(--line-strong);}
  .btn-danger{background:rgba(223,128,113,0.14);border:1px solid rgba(223,128,113,0.4);color:var(--loss);}
  .btn-danger:hover{background:rgba(223,128,113,0.22);}

  .hist-head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 10px;}
  .hist-head h2{font-family:'Inter';font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass);font-weight:600;margin:0;}
  .hist-head .clear{font-size:12px;color:var(--bone-dim);background:none;border:0;cursor:pointer;font-family:inherit;}
  .hist-head .clear:hover{color:var(--loss);}
  .empty{color:var(--bone-dim);font-size:13px;text-align:center;padding:22px 10px;border:1px dashed var(--line);border-radius:var(--radius);}
  .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:rgba(0,0,0,0.12);cursor:pointer;transition:border-color .12s,background .12s;}
  .row:hover{border-color:var(--line-strong);background:rgba(0,0,0,0.2);}
  .row .no{font-family:'Fraunces',serif;font-size:15px;color:var(--brass);width:26px;flex:none;font-variant-numeric:oldstyle-nums;}
  .row .deltas{display:flex;flex-wrap:wrap;gap:5px 10px;flex:1;}
  .row .d{font-size:13px;font-variant-numeric:tabular-nums;}
  .row .d .dn{color:var(--bone-dim);margin-right:4px;}
  .row .d .dv{font-weight:600;}
  .row .d .dv.pos{color:var(--win);} .row .d .dv.neg{color:var(--loss);} .row .d .dv.zero{color:var(--bone-dim);}
  .row .edit{color:var(--bone-dim);font-size:13px;flex:none;}

  .foot{margin-top:18px;font-size:11px;line-height:1.6;color:var(--bone-dim);text-align:center;padding:0 8px;}
  .foot a{color:var(--brass);text-decoration:none;}

  /* overlay / modal */
  .overlay{position:fixed;inset:0;background:rgba(6,16,13,0.74);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .overlay.show{display:flex;}
  .modal{width:100%;max-width:460px;background:linear-gradient(165deg,var(--surface) 0%,var(--felt-deep) 130%);border:1px solid var(--line-strong);border-radius:var(--radius);box-shadow:0 30px 70px -20px rgba(0,0,0,0.8);padding:18px 17px;max-height:84dvh;overflow:auto;}
  .modal h3{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:0 0 4px;}
  .modal .msg{font-size:14px;color:var(--bone-dim);line-height:1.5;margin:0 0 18px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .modal-head h3{margin:0;}
  .edit-grid{display:grid;gap:10px;grid-template-columns:repeat(2,1fr);}
  @media(min-width:480px){.edit-grid{grid-template-columns:repeat(4,1fr);}}

  .sess-list{display:flex;flex-direction:column;gap:9px;}
  .sess{border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:rgba(0,0,0,0.14);}
  .sess.current{border-color:var(--brass);background:rgba(201,168,94,0.07);}
  .sess-top{display:flex;align-items:center;gap:8px;}
  .sess-star{color:var(--brass-bright);font-size:13px;flex:none;width:14px;}
  .sess-title{flex:1;min-width:0;background:transparent;border:0;color:var(--bone);font-family:'Inter';font-size:14px;font-weight:600;padding:3px 4px;border-radius:6px;}
  .sess-title:focus{outline:none;background:rgba(0,0,0,0.25);}
  .sess-x{appearance:none;border:0;background:transparent;color:var(--bone-dim);font-size:17px;cursor:pointer;padding:2px 6px;flex:none;border-radius:6px;}
  .sess-x:hover{color:var(--loss);}
  .sess-meta{font-size:12px;color:var(--bone-dim);margin:6px 2px 0;line-height:1.45;}
  .sess-meta .lead{color:var(--brass);}
  .sess-open{appearance:none;border:1px solid var(--line);background:rgba(0,0,0,0.2);color:var(--bone);font:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer;margin-top:9px;}
  .sess-open:hover{border-color:var(--brass);}
  .sess-actions{display:flex;gap:8px;margin-top:9px;}
  .codebox{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--line);border-radius:10px;color:var(--bone);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.55;padding:11px;resize:vertical;word-break:break-all;}
  .codebox:focus{outline:none;border-color:var(--brass);}
  .err{color:var(--loss);font-size:12px;min-height:15px;margin-top:7px;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
  :focus-visible{outline:2px solid var(--brass-bright);outline-offset:2px;border-radius:6px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">Števec</div>
      <h1>Tarok</h1>
      <div class="sub" id="brandSub"></div>
    </div>
    <div class="head-tools">
      <div class="seg" role="group" aria-label="Število igralcev">
        <button id="p3" aria-pressed="false">3</button>
        <button id="p4" aria-pressed="true">4</button>
      </div>
      <button class="pill" id="games" aria-label="Igre">Igre <span class="badge" id="gamesCount">1</span></button>
    </div>
  </header>

  <div class="players n4" id="players"></div>

  <section class="panel">
    <h2>Nova runda <span class="sum" id="sum">vsota <b>0</b></span></h2>
    <div class="entry-grid n4" id="entry"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="clearEntry">Počisti</button>
      <button class="btn btn-primary" id="record">Zapiši rundo</button>
    </div>
  </section>

  <section>
    <div class="hist-head">
      <h2>Runde</h2>
      <button class="clear" id="clearHist">Pobriši runde</button>
    </div>
    <div id="history"></div>
  </section>

  <p class="foot">
    Ročni vnos: za vsako rundo vpiši plus/minus točke igralcev, radeljce dodajaš s + in &minus;. Klikni rundo za urejanje.<br>
    Vsaka ekipa ima svojo igro pod gumbom <b>Igre</b>. Pravila: <a href="https://pagat.si/tarok/" target="_blank" rel="noopener">pagat.si</a>
  </p>
</div>

<div class="overlay" id="overlay"></div>

<script>
(function(){
  "use strict";
  var SUITS=[{g:"\u2663",red:false},{g:"\u2660",red:false},{g:"\u2665",red:true},{g:"\u2666",red:true}];
  var DEFAULT_NAMES=["Igralec 1","Igralec 2","Igralec 3","Igralec 4"];
  var LKEY="tarok-stevec-lib-v2", OLDKEY="tarok-stevec-v1";

  var library={sessions:[],currentId:null};
  var state=null;            // points to current session
  var pendingInputs=[0,0,0,0];
  var pendingDouble=[false,false,false,false];  // per-player ×2 toggle for the round being entered
  var armed=null;            // index of field waiting to be paired
  var entrySetters=[];       // setter fns for entry fields (for mirroring)
  var PAIRCOL=["#c9a85e","#6fb3c9"];

  // ---------- storage ----------
  function getKey(k){
    return new Promise(function(res){
      var local=null;
      try{ local=localStorage.getItem(k); }catch(e){ local=null; }
      try{
        if(window.storage&&window.storage.get){
          window.storage.get(k,false).then(function(r){ res((r&&r.value)?r.value:local); }).catch(function(){ res(local); });
          return;
        }
      }catch(e){}
      res(local);
    });
  }
  function save(){
    if(state) state.updated=Date.now();
    var data=JSON.stringify(library);
    try{ if(window.storage&&window.storage.set){ window.storage.set(LKEY,data,false); } }catch(e){}
    try{ localStorage.setItem(LKEY,data); }catch(e){}
  }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function newSession(n){ return {id:uid(),title:"",numPlayers:(n===3?3:4),names:DEFAULT_NAMES.slice(),radlci:[0,0,0,0],links:[],rounds:[],created:Date.now(),updated:Date.now()}; }
  function freshLib(){ var s=newSession(4); return {sessions:[s],currentId:s.id}; }
  function normSession(s){
    s.id=s.id||uid();
    s.numPlayers=s.numPlayers===3?3:4;
    s.title=typeof s.title==="string"?s.title:"";
    s.names=(s.names||DEFAULT_NAMES).slice(0,4); while(s.names.length<4)s.names.push(DEFAULT_NAMES[s.names.length]);
    s.radlci=(s.radlci||[0,0,0,0]).slice(0,4).map(function(x){return Math.max(0,Math.round(Number(x)||0));}); while(s.radlci.length<4)s.radlci.push(0);
    s.rounds=(s.rounds||[]).map(function(r){
      var d=(r.deltas||[]).slice(0,4).map(function(x){return Math.round(Number(x)||0);}); while(d.length<4)d.push(0);
      var u=(r.used||[]).slice(0,4).map(Boolean); while(u.length<4)u.push(false);
      var c=(r.consumed||[]).slice(0,4).map(Boolean); while(c.length<4)c.push(false);
      return {deltas:d,used:u,consumed:c};
    });
    s.links=(s.links||[]).filter(function(p){return Array.isArray(p)&&p.length===2;}).map(function(p){return [Math.round(p[0]),Math.round(p[1])];}).filter(function(p){return p[0]!==p[1]&&p[0]>=0&&p[1]>=0&&p[0]<4&&p[1]<4;}).slice(0,2);
    s.created=s.created||Date.now(); s.updated=s.updated||Date.now();
    return s;
  }
  function normLib(l){
    if(!l||!l.sessions||!l.sessions.length) return freshLib();
    l.sessions=l.sessions.map(normSession);
    if(!l.currentId||!l.sessions.some(function(s){return s.id===l.currentId;})) l.currentId=l.sessions[0].id;
    return l;
  }
  function load(cb){
    getKey(LKEY).then(function(libStr){
      if(libStr){ try{ library=normLib(JSON.parse(libStr)); }catch(e){ library=freshLib(); } return cb(); }
      getKey(OLDKEY).then(function(oldStr){
        if(oldStr){
          try{ var s=JSON.parse(oldStr); var sess=newSession(s.numPlayers||4);
            sess.names=s.names||sess.names; sess.radlci=s.radlci||sess.radlci; sess.rounds=s.rounds||[];
            normSession(sess); library={sessions:[sess],currentId:sess.id};
          }catch(e){ library=freshLib(); }
        } else library=freshLib();
        cb();
      });
    });
  }

  // ---------- derived ----------
  function cur(){ return library.sessions.filter(function(s){return s.id===library.currentId;})[0]; }
  function totalsOf(s){ var t=[0,0,0,0]; s.rounds.forEach(function(r){for(var i=0;i<4;i++)t[i]+=(r.deltas[i]||0);}); return t; }
  function leaderOf(s){
    if(s.rounds.length===0) return -1;
    var t=totalsOf(s),best=-Infinity,idx=-1,tie=false;
    for(var i=0;i<s.numPlayers;i++){ if(t[i]>best){best=t[i];idx=i;tie=false;} else if(t[i]===best){tie=true;} }
    return tie?-1:idx;
  }
  function sessTitle(s){ if(s.title&&s.title.trim()) return s.title.trim();
    return s.names.slice(0,s.numPlayers).map(function(n){return (n||"").trim().split(" ")[0]||"?";}).join(", "); }

  // ---------- elements ----------
  var $=function(id){return document.getElementById(id);};
  var elPlayers=$("players"),elEntry=$("entry"),elHistory=$("history"),elSum=$("sum"),
      elSub=$("brandSub"),elGamesCount=$("gamesCount"),overlay=$("overlay");

  // ---------- modal core ----------
  function el(html){ var d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }
  function openModal(node){ overlay.innerHTML=""; overlay.appendChild(node); overlay.classList.add("show"); }
  function closeModal(){ overlay.classList.remove("show"); overlay.innerHTML=""; }
  overlay.addEventListener("click",function(e){ if(e.target===overlay) closeModal(); });

  // ---------- field builder ----------
  function buildField(i,name,suit,vals,onChange,linkOpts,dblOpts){
    var f=document.createElement("div"); f.className="field";
    var v=vals[i]||0, scls=v>0?"pos":(v<0?"neg":"");
    var linkHtml="";
    if(linkOpts){
      var lcls="linkbtn", lab="Poveži v par";
      if(linkOpts.armed){ lcls+=" armed"; lab="Izberi par"; }
      else if(linkOpts.color){ lcls+=" linked"; lab="Prekini par"; }
      var lstyle=linkOpts.color?(' style="--pc:'+linkOpts.color+'"'):"";
      linkHtml='<button class="'+lcls+'"'+lstyle+' data-link aria-label="'+lab+'">\u26AD</button>';
    }
    var dblHtml = dblOpts ? ('<button class="dblbtn'+(dblOpts.on?" on":"")+'" data-dbl aria-pressed="'+(dblOpts.on?"true":"false")+'" aria-label="Podvoji točke (\u00d72)">\u00d72</button>') : "";
    f.innerHTML=linkHtml+dblHtml+
      '<div class="fname"><span class="s'+(suit.red?" red":"")+'">'+suit.g+'</span>'+escapeHtml(name)+'</div>'+
      '<div class="stepper '+scls+'"><button data-s="-" aria-label="Manj">\u2212</button>'+
      '<input type="text" inputmode="numeric" value="'+(v||"")+'" placeholder="0" aria-label="Točke '+escapeAttr(name)+'">'+
      '<button data-s="+" aria-label="Več">+</button></div>'+
      (dblOpts?'<div class="dblhint" data-hint></div>':'');
    var input=f.querySelector("input"),stepper=f.querySelector(".stepper"),hint=f.querySelector("[data-hint]");
    if(linkOpts&&linkOpts.color) stepper.style.borderColor=linkOpts.color;
    function upHint(){ if(!hint)return; var b=vals[i]||0, on=dblOpts&&dblOpts.on;
      hint.innerHTML = (on&&b!==0) ? ('\u00d72 = <b>'+(b*2>0?"+":"")+(b*2)+'</b>') : (on?'\u00d72':''); }
    function set(nv,silent){ nv=clampInt(nv); vals[i]=nv; input.value=nv===0?"":String(nv);
      stepper.className="stepper "+(nv>0?"pos":(nv<0?"neg":"")); if(linkOpts&&linkOpts.color)stepper.style.borderColor=linkOpts.color;
      upHint(); if(!silent&&onChange)onChange(i); }
    input.addEventListener("input",function(){
      var raw=input.value.replace(/[^0-9\-]/g,""); if(raw!==input.value)input.value=raw;
      var nv=parseInt(raw,10); if(isNaN(nv))nv=0; vals[i]=clampInt(nv);
      stepper.className="stepper "+(vals[i]>0?"pos":(vals[i]<0?"neg":"")); if(linkOpts&&linkOpts.color)stepper.style.borderColor=linkOpts.color;
      upHint(); if(onChange)onChange(i); });
    input.addEventListener("blur",function(){ set(vals[i]||0); });
    var bs=f.querySelectorAll(".stepper button");
    bs[0].addEventListener("click",function(){ set((vals[i]||0)-5); });
    bs[1].addEventListener("click",function(){ set((vals[i]||0)+5); });
    if(linkOpts){ f.querySelector("[data-link]").addEventListener("click",function(e){ e.stopPropagation(); linkOpts.onLink(i); }); }
    if(dblOpts){ f.querySelector("[data-dbl]").addEventListener("click",function(e){ e.stopPropagation(); dblOpts.onToggle(i); }); }
    upHint();
    return {node:f,set:set};
  }

  // ---------- entry ----------
  function partnerOf(i){ var L=cur().links||[]; for(var k=0;k<L.length;k++){ if(L[k][0]===i)return L[k][1]; if(L[k][1]===i)return L[k][0]; } return null; }
  function pairColorOf(i){ var L=cur().links||[]; for(var k=0;k<L.length;k++){ if(L[k][0]===i||L[k][1]===i)return PAIRCOL[k%PAIRCOL.length]; } return null; }
  function onLink(i){
    var s=cur(); s.links=s.links||[];
    var inPair=-1;
    for(var k=0;k<s.links.length;k++){ if(s.links[k][0]===i||s.links[k][1]===i){ inPair=k; break; } }
    if(inPair>=0){ s.links.splice(inPair,1); armed=null; }
    else if(armed===null){ armed=i; }
    else if(armed===i){ armed=null; }
    else {
      s.links=s.links.filter(function(p){return p.indexOf(armed)<0&&p.indexOf(i)<0;});
      if(s.links.length<2){
        s.links.push([armed,i]);
        var av=pendingInputs[armed]||0, iv=pendingInputs[i]||0;
        var shared=av!==0?av:iv;
        pendingInputs[armed]=shared; pendingInputs[i]=shared;
      }
      armed=null;
    }
    save(); renderEntry();
  }
  function handleEntryChange(i){
    var p=partnerOf(i);
    if(p!=null&&entrySetters[p]) entrySetters[p](pendingInputs[i],true);
    updateSum();
  }
  function onToggleDbl(i){ pendingDouble[i]=!pendingDouble[i]; renderEntry(); }
  function renderEntry(){
    var s=cur(),n=s.numPlayers;
    s.links=(s.links||[]).filter(function(p){return p[0]<n&&p[1]<n&&p[0]!==p[1];});
    elEntry.className="entry-grid n"+n; elEntry.innerHTML=""; entrySetters=[];
    for(var i=0;i<n;i++){
      var lo={ armed:armed===i, color:pairColorOf(i), onLink:onLink };
      var dl={ on:pendingDouble[i], onToggle:onToggleDbl };
      var fld=buildField(i,s.names[i],SUITS[i],pendingInputs,handleEntryChange,lo,dl);
      entrySetters[i]=fld.set; elEntry.appendChild(fld.node);
    }
    updateSum();
  }
  function effOf(i){ var b=pendingInputs[i]||0; return (b!==0&&pendingDouble[i])?b*2:b; }
  function updateSum(){
    if(armed!==null){ elSum.innerHTML='<span style="color:var(--brass)">tapni drugega igralca za par</span>'; return; }
    var sum=0,n=cur().numPlayers; for(var i=0;i<n;i++)sum+=effOf(i);
    elSum.innerHTML='vsota <b>'+(sum>0?"+":"")+sum+'</b>'; }

  // ---------- history ----------
  function renderHistory(){
    var s=cur();

        ds+='<span class="d"><span class="dn">'+escapeHtml(shortName(s.names[i]))+'</span><span class="dv '+cls+'">'+(v>0?"+":"")+v+rm+'</span></span>'; }
      html+='<div class="row" data-edit="'+r+'" tabindex="0" role="button" aria-label="Uredi rundo '+(r+1)+'">'+
        '<span class="no">'+(r+1)+'</span><div class="deltas">'+ds+'</div><span class="edit">uredi</span></div>';
    }

      var idx=parseInt(row.getAttribute("data-edit"),10);

  function shortName(nm){ nm=(nm||"").trim(); return nm.length>8?nm.slice(0,8):nm; }

  function editRound(idx){

  // ---------- games / sessions modal ----------
  function renderSub(){ var s=cur(); elSub.textContent=sessTitle(s); elGamesCount.textContent=library.sessions.length; }
  // ---------- share / import ----------
  function b64urlEncode(str){
    var utf8=unescape(encodeURIComponent(str));
    return btoa(utf8).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  }
  function b64urlDecode(code){
    var b=code.replace(/-/g,"+").replace(/_/g,"/"); while(b.length%4)b+="=";
    return decodeURIComponent(escape(atob(b)));
  }
  function encodeGame(s){
    var n=s.numPlayers, L=[];
    L.push("TRK1"); L.push(String(n));
    L.push((s.title||"").replace(/[\n\t]/g," "));
    L.push(s.names.slice(0,n).map(function(x){return (x||"").replace(/[\n\t]/g," ");}).join("\t"));
    L.push(s.radlci.slice(0,n).join(","));
    s.rounds.forEach(function(r){
      var um=0,cm=0,parts=[];
      for(var i=0;i<n;i++){ parts.push(r.deltas[i]||0); if(r.used&&r.used[i])um|=(1<<i); if(r.consumed&&r.consumed[i])cm|=(1<<i); }
      parts.push(um,cm); L.push(parts.join(","));
    });
    return b64urlEncode(L.join("\n"));
  }
  function decodeGame(code){
    code=(code||"").trim().replace(/\s+/g,"");
    if(!code) throw new Error("empty");
    var S=b64urlDecode(code), L=S.split("\n");
    if(L[0]!=="TRK1") throw new Error("magic");
    var n=parseInt(L[1],10); if(n!==3&&n!==4) throw new Error("n");
    var names=(L[3]||"").split("\t");
    var rad=(L[4]||"").split(",");
    var rounds=[];
    for(var li=5;li<L.length;li++){
      var line=L[li]; if(!line) continue;
      var p=line.split(",").map(function(x){return Math.round(Number(x)||0);});
      if(p.length<n+2) continue;
      var deltas=[0,0,0,0],used=[false,false,false,false],cons=[false,false,false,false];
      for(var i=0;i<n;i++) deltas[i]=p[i]||0;
      var um=p[n]||0, cm=p[n+1]||0;
      for(var i=0;i<4;i++){ used[i]=!!(um&(1<<i)); cons[i]=!!(cm&(1<<i)); }
      rounds.push({deltas:deltas,used:used,consumed:cons});
    }
    var sess=newSession(n); sess.title=L[2]||"";
    for(var i=0;i<4;i++){ sess.names[i]=(names[i]!==undefined&&names[i]!=="")?names[i]:DEFAULT_NAMES[i]; sess.radlci[i]=Math.max(0,Math.round(Number(rad[i])||0)); }
    sess.rounds=rounds;
    return normSession(sess);
  }
  function legacyCopy(ta,done){ try{ ta.focus(); ta.select(); ta.setSelectionRange(0,ta.value.length); document.execCommand("copy"); done(); }catch(e){ if(ta){ta.focus();ta.select();} } }
  function copyText(text,ta,btn){
    var done=function(){ if(btn){ var o=btn.getAttribute("data-lbl"); btn.textContent="Kopirano \u2713"; setTimeout(function(){ btn.textContent=o; },1400); } };
    try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(function(){ legacyCopy(ta,done); }); return; } }catch(e){}
    legacyCopy(ta,done);
  }
  function shareModal(s){
    var code=encodeGame(s);
    var m=el('<div class="modal" role="dialog" aria-modal="true"></div>');
    m.innerHTML='<div class="modal-head"><h3>Deli "'+escapeHtml(sessTitle(s))+'"</h3></div>'+

      '<textarea class="codebox" id="codeout" readonly rows="4">'+escapeHtml(code)+'</textarea>'+
      '<div class="modal-actions"><button class="btn btn-ghost" data-back>Nazaj</button>'+

    var ta=m.querySelector("#codeout");
    m.querySelector("[data-back]").addEventListener("click",openGames);
    m.querySelector("[data-copy]").addEventListener("click",function(){ copyText(code,ta,this); });
    openModal(m); setTimeout(function(){ try{ta.focus();ta.select();}catch(e){} },30);
  }
  function importModal(){
    var m=el('<div class="modal" role="dialog" aria-modal="true"></div>');
    m.innerHTML='<div class="modal-head"><h3>Uvozi igro</h3></div>'+
      '<p class="msg">Prilepi prejeto kodo. Igra se doda kot nova in se odpre.</p>'+

      '<div class="err" id="imperr"></div>'+

    var list=m.querySelector("#slist");

        '<button class="sess-x" data-x aria-label="Izbriši igro">\u00d7</button></div>'+
        '<div class="sess-meta">'+meta+'</div>'+
        '<div class="sess-actions"><button class="sess-open" data-share>Deli</button>'+

      var ti=row.querySelector(".sess-title");

      ti.addEventListener("click",function(e){ e.stopPropagation(); });

      row.querySelector("[data-share]").addEventListener("click",function(){ shareModal(s); });

    });
    m.querySelector("[data-new]").addEventListener("click",function(){
      var s=newSession(cur().numPlayers); library.sessions.push(s); library.currentId=s.id;
      pendingInputs=[0,0,0,0]; save(); closeModal(); renderAll();
    });
    m.querySelector("[data-import]").addEventListener("click",importModal);

  function deleteSession(id){
    var s=library.sessions.filter(function(x){return x.id===id;})[0]; if(!s) return;
    confirmModal("Izbrišem igro?", '"'+sessTitle(s)+'" bo trajno odstranjena.', "Izbriši", function(){
      library.sessions=library.sessions.filter(function(x){return x.id!==id;});
      if(library.sessions.length===0){ var ns=newSession(4); library.sessions.push(ns); library.currentId=ns.id; }
      if(library.currentId===id){ library.currentId=library.sessions.slice().sort(function(a,b){return b.updated-a.updated;})[0].id; pendingInputs=[0,0,0,0]; }
      save(); renderAll(); openGames();
    }, true);
  }

  // ---------- actions ----------
  $("record").addEventListener("click",function(){
    var s=cur(),any=false,base=[0,0,0,0];
    for(var i=0;i<s.numPlayers;i++){ var v=pendingInputs[i]||0; base[i]=v; if(v!==0)any=true; }
    if(!any) return;
    var d=[0,0,0,0],used=[false,false,false,false],cons=[false,false,false,false];
    for(var i=0;i<s.numPlayers;i++){
      var v=base[i];
      if(v!==0 && pendingDouble[i]){ d[i]=v*2; used[i]=true; }
      else { d[i]=v; }
    }
    s.rounds.push({deltas:d,used:used,consumed:cons}); pendingInputs=[0,0,0,0]; pendingDouble=[false,false,false,false]; s.links=[]; armed=null;
    save(); renderPlayers(); renderEntry(); renderHistory();

  $("clearHist").addEventListener("click",function(){

    confirmModal("Pobrišem runde?", "Vse runde te igre bodo izbrisane. Imena in radeljci ostanejo.", "Pobriši", function(){

  function setPlayers(n){
    var s=cur(); if(s.numPlayers===n) return;
    if(n===3&&s.numPlayers===4){
      var hasData=s.rounds.some(function(r){return r.deltas[3]!==0;})||s.radlci[3]!==0;
      if(hasData){ confirmModal("Na 3 igralce?", "4. igralec ne bo več prikazan v tej igri.", "Preklopi", function(){ s.numPlayers=3; save(); renderAll(); }); return; }
    }

  }

  // ---------- helpers ----------
