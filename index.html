<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <style>
    :root{
      --bg:#fafafa;
      --fg:#111;
      --muted:#666;
      --line:#e7e7e7;
      --card:#fff;
      --button:#111;
      --buttonText:#fff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font:16px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main{
      width:min(720px, calc(100% - 32px));
      margin:48px auto;
    }
    h1{
      margin:0 0 8px;
      font-size:1.4rem;
      font-weight:700;
    }
    .intro{
      margin:0 0 24px;
      color:var(--muted);
      max-width:56ch;
    }
    .list{
      display:grid;
      gap:12px;
    }
    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:16px 18px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
    }
    .title{
      font-weight:600;
      margin:0 0 4px;
    }
    .desc{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
    }
    .button{
      display:inline-block;
      text-decoration:none;
      background:var(--button);
      color:var(--buttonText);
      padding:10px 14px;
      border-radius:10px;
      font-size:.95rem;
      font-weight:600;
      white-space:nowrap;
    }
    .button:hover{
      opacity:.9;
    }
    @media (max-width: 640px){
      .item{align-items:flex-start;flex-direction:column}
      .button{width:100%;text-align:center}
    }
  </style>
</head>
<body>
  <main>
    <h1>Games</h1>
    <p class="intro">Hi, this is a small collection of AI-generated games that you can play at parties if you don't have other social games :)</p>

    <div class="list">
      <section class="item">
        <div>
          <p class="title">After Dark</p>
          <p class="desc">A chaotic little voting game for judging your friends.</p>
        </div>
        <a class="button" href="./after-dark.html">Play</a>
      </section>

      <section class="item">
        <div>
          <p class="title">The Imposter</p>
          <p class="desc">A social deduction game about lying with confidence.</p>
        </div>
        <a class="button" href="./imposter.html">Play</a>
      </section>
    </div>
  </main>
</body>
</html>
